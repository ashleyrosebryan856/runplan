<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUNPLAN</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5f3ef; }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #1a1a1a;
      color: #f5f3ef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
    }

    header h1 {
      font-size: 17px;
      font-weight: normal;
      letter-spacing: 0.1em;
    }

    .controls { display: flex; align-items: center; gap: 8px; }

    .dist {
      display: flex;
      align-items: baseline;
      gap: 5px;
      padding-right: 14px;
      margin-right: 6px;
      border-right: 1px solid rgba(255,255,255,0.2);
    }

    .dist-mi { font-size: 24px; color: #f5f3ef; }
    .dist-unit { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; }
    .dist-km { font-size: 13px; color: rgba(255,255,255,0.4); }

    button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #f5f3ef;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
    }
    button:hover { background: rgba(255,255,255,0.1); }

    #map {
      position: fixed;
      top: 56px;
      left: 0; right: 0; bottom: 0;
      cursor: crosshair;
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,20,20,0.8);
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 8px 20px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      transition: opacity 0.4s;
    }
    .hint.hidden { opacity: 0; }
  </style>
</head>
<body>

<header>
  <h1>RUNPLAN</h1>
  <div class="controls">
    <div class="dist">
      <span class="dist-mi" id="dist-mi">0.00</span>
      <span class="dist-unit">mi</span>
      <span class="dist-km" id="dist-km">· 0.00 km</span>
    </div>
    <button onclick="undoLast()">Undo</button>
    <button onclick="clearRoute()">Clear</button>
    <button onclick="locateMe()" title="My location">⊕</button>
  </div>
</header>

<div id="map"></div>
<div class="hint" id="hint">Hold and drag to draw your route</div>

<script>
  const map = L.map('map', { zoomControl: true }).setView([45.5231, -122.6765], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  let points = [], polyline = null, startMarker = null;
  let drawing = false;
  const hint = document.getElementById('hint');
  const MIN_DIST = 8;

  function haversine(a, b) {
    const R = 6371000, r = x => x * Math.PI / 180;
    const dLat = r(b.lat - a.lat), dLon = r(b.lng - a.lng);
    const s = Math.sin(dLat/2)**2 + Math.cos(r(a.lat)) * Math.cos(r(b.lat)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
  }

  function updateDistance() {
    let d = 0;
    for (let i = 1; i < points.length; i++) d += haversine(points[i-1], points[i]);
    document.getElementById('dist-mi').textContent = (d / 1609.344).toFixed(2);
    document.getElementById('dist-km').textContent = '· ' + (d / 1000).toFixed(2) + ' km';
  }

  function getLatLng(e) {
    if (e.latlng) return e.latlng;
    if (e.originalEvent && e.originalEvent.touches && e.originalEvent.touches[0]) {
      return map.mouseEventToLatLng(e.originalEvent.touches[0]);
    }
    return null;
  }

  function startDraw(e) {
    drawing = true;
    map.dragging.disable();
    map.doubleClickZoom.disable();
    hint.classList.add('hidden');

    const latlng = getLatLng(e);
    if (!latlng) return;

    if (points.length === 0) {
      if (startMarker) map.removeLayer(startMarker);
      startMarker = L.circleMarker(latlng, {
        radius: 6, color: '#fff', weight: 2.5,
        fillColor: '#2d8a5e', fillOpacity: 1
      }).addTo(map);
    }

    points.push(latlng);

    if (!polyline) {
      polyline = L.polyline(points, { color: '#c0392b', weight: 4, opacity: 0.85 }).addTo(map);
    }

    updateDistance();
  }

  function continueDraw(e) {
    if (!drawing) return;
    const latlng = getLatLng(e);
    if (!latlng) return;

    const last = points[points.length - 1];
    if (map.distance(last, latlng) < MIN_DIST) return;

    points.push(latlng);
    polyline.setLatLngs(points);
    updateDistance();
  }

  function stopDraw() {
    drawing = false;
    map.dragging.enable();
    map.doubleClickZoom.enable();
  }

  map.on('mousedown', startDraw);
  map.on('mousemove', continueDraw);
  map.on('mouseup', stopDraw);

  map.on('touchstart', startDraw, { passive: false });
  map.on('touchmove', continueDraw, { passive: false });
  map.on('touchend', stopDraw);

  function undoLast() {
    if (!points.length) return;
    points.splice(Math.max(0, points.length - 20), 20);
    if (polyline) polyline.setLatLngs(points);
    if (points.length === 0) {
      if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
      if (polyline) { map.removeLayer(polyline); polyline = null; }
      hint.classList.remove('hidden');
    }
    updateDistance();
  }

  function clearRoute() {
    points = [];
    if (polyline) { map.removeLayer(polyline); polyline = null; }
    if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
    hint.classList.remove('hidden');
    updateDistance();
  }

  function locateMe() {
    map.locate({ setView: true, maxZoom: 15 });
  }

  map.on('locationfound', e => map.setView(e.latlng, 15));
  map.on('locationerror', () => alert('Location access denied or unavailable.'));
</script>
</body>
</html>
