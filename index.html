  // ── Wordmark letter flip ───────────────────────────────────
  (function() {
    const letters = document.querySelectorAll('.wl');
    const flipped = new Set();

    function maybeFlip() {
      const idx = Math.floor(Math.random() * letters.length);
      const letter = letters[idx];

      if (flipped.has(idx)) {
        // flip back
        letter.classList.remove('flipped');
        flipped.delete(idx);
      } else {
        // flip forward
        letter.classList.add('flipped');
        flipped.add(idx);
        // auto flip back after random short delay
        setTimeout(() => {
          letter.classList.remove('flipped');
          flipped.delete(idx);
        }, 400 + Math.random() * 800);
      }

      // schedule next event at random interval
      setTimeout(maybeFlip, 2500 + Math.random() * 5000);
    }

    // kick off after a short pause
    setTimeout(maybeFlip, 3000);
  })();

      .space-hint { display: none; }
    }

    /* Handle — hidden on desktop */
    .cmd-handle {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 10px 0 4px;
      cursor: pointer;
      border-bottom: var(--border);
    }
    .cmd-handle-bar {
      width: 36px;
      height: 4px;
      background: rgba(15,15,13,0.2);
      border-radius: 2px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Wordmark -->
<div class="wordmark" id="wordmark">
  <span class="wl">R</span><span class="wl">U</span><span class="wl">N</span><span class="wl">P</span><span class="wl">L</span><span class="wl">A</span><span class="wl">N</span>
</div>

<!-- Settings button -->
<button class="gear-btn" onclick="toggleSettings()" id="gear-btn" title="Settings">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<!-- Settings Panel -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-header">
    <span class="settings-title">Settings</span>
    <button class="settings-close" onclick="toggleSettings()">✕</button>
  </div>

  <div class="settings-section">
    <div class="settings-label">Map Style</div>
    <div class="pill-group">
      <button class="pill active" id="env-street" onclick="switchEnv('streets-v12','env-street')">Street</button>
      <button class="pill" id="env-trail" onclick="switchEnv('outdoors-v12','env-trail')">Trail</button>
      <button class="pill" id="env-sat" onclick="switchEnv('satellite-streets-v12','env-sat')">Satellite</button>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-label">Units</div>
    <div class="pill-group">
      <button class="pill active" id="unit-imperial" onclick="setUnits('imperial')">Miles</button>
      <button class="pill" id="unit-metric" onclick="setUnits('metric')">Kilometres</button>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-label">Map Orientation</div>
    <div class="pill-group">
      <button class="pill active" id="north-free" onclick="setNorth('free')">Free</button>
      <button class="pill" id="north-true" onclick="setNorth('true')">True North</button>

<!-- Distance -->
<div class="distance-block">

  <div class="cmd-dist-row">
    <span class="cmd-dist-mi" id="dist-mi">0.00</span>
    <span class="cmd-dist-unit" id="dist-unit">mi</span>

  <div class="cmd-dist-km" id="dist-km" style="display:none;">0.00 km</div>
</div>

<!-- Command Center -->
<div class="cmd" id="cmd-panel">
  <div class="cmd-handle" onclick="toggleCmd()">
    <div class="cmd-handle-bar"></div>
  </div>

  <div class="cmd-section">
    <div class="pill-group" style="margin-bottom:10px;">
      <button class="pill wide" onclick="undoStroke()">Undo</button>
      <button class="pill wide danger" onclick="clearRoute()">Clear</button>
    </div>
    <div class="pill-group" style="margin-bottom:10px;">
      <button class="pill wide" onclick="closeLoop()">Close Loop</button>
      <button class="pill wide" onclick="openSave()">Save Route</button>
    </div>
    <div class="pill-group">
      <button class="pill wide" id="routes-toggle" onclick="toggleRoutes()">Routes</button>
      <button class="pill" onclick="locateMe()" title="Locate me" style="flex:0;padding:7px 14px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
          <circle cx="12" cy="12" r="7" stroke-dasharray="1 0"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Routes panel -->
  <div class="routes-panel" id="routes-panel">
    <div class="routes-inner" id="routes-inner"></div>
  </div>

</div>

<!-- Save sheet -->
<div class="save-sheet" id="save-sheet">
  <div class="save-sheet-bg" onclick="closeSave()"></div>
  <div class="save-sheet-panel">
    <div class="save-field">
      <div class="save-label">Route Name</div>
      <input class="save-input" type="text" id="save-name" placeholder="Morning loop" />
    </div>
    <div class="save-field">
      <div class="save-label">Date</div>
      <input class="save-input" type="date" id="save-date" />
    </div>
    <div class="save-field">
      <div class="save-label">Notes</div>
      <input class="save-input" type="text" id="save-notes" placeholder="How did it feel?" />
    </div>
    <div class="save-actions">
      <button class="save-submit" onclick="saveRoute()">Save Route</button>
      <button class="save-cancel" onclick="closeSave()">Cancel</button>
    </div>
  </div>
</div>

<div class="space-hint" id="space-hint">
  <span id="space-hint-text">Hold <kbd>Space</kbd> to pan</span>
</div>
<div class="mobile-mode-bar" id="mobile-mode-bar">
  <button class="mobile-mode-btn" id="mobile-btn-draw" onclick="setMobileMode('draw')">Draw</button>
  <button class="mobile-mode-btn active" id="mobile-btn-pan" onclick="setMobileMode('pan')">Pan</button>
</div>

<div class="snap-indicator" id="snap-indicator">Snapping to roads</div>

<script>
  mapboxgl.accessToken = 'pk.eyJ1IjoiYXNobGV5cm9zZWJyeWFuODU2IiwiYSI6ImNtcDZnbnMwZjFrcWoycm42cDU5cTl4azEifQ._nvXG6LV2sP1E699U31rog';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v12',
    center: [-122.6765, 45.5231],
    zoom: 13
  });

  // zoom controls removed

  let strokes = [], mileMarkers = [], startMarker = null, locationMarker = null;
  let currentStroke = [], drawing = false, mode = 'map';
  let routesOpen = false;

  const snapEl = document.getElementById('snap-indicator');

  function emptyGeo() { return { type: 'FeatureCollection', features: [] }; }
  function lineGeo(c) { return { type: 'Feature', geometry: { type: 'LineString', coordinates: c } }; }

  map.on('load', () => {
    initMobileMode();
    map.addSource('route', { type: 'geojson', data: emptyGeo() });
    map.addLayer({ id: 'route-line', type: 'line', source: 'route',
      paint: { 'line-color': '#0f0f0d', 'line-width': 4, 'line-opacity': 0.9 },
      layout: { 'line-cap': 'round', 'line-join': 'round' }
    });
    map.addSource('preview', { type: 'geojson', data: emptyGeo() });
    map.addLayer({ id: 'preview-line', type: 'line', source: 'preview',
      paint: { 'line-color': '#0f0f0d', 'line-width': 4, 'line-opacity': 1, 'line-dasharray': [3,2] },
      layout: { 'line-cap': 'round', 'line-join': 'round' }
    });
  });

  function switchEnv(styleId, btnId) {
    document.querySelectorAll('.pill[id^="env-"]').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');
    map.setStyle('mapbox://styles/mapbox/' + styleId);
    map.once('style.load', () => {
      map.addSource('route', { type: 'geojson', data: emptyGeo() });
      map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#0f0f0d', 'line-width': 4, 'line-opacity': 0.9 }, layout: { 'line-cap': 'round', 'line-join': 'round' } });
      map.addSource('preview', { type: 'geojson', data: emptyGeo() });
      map.addLayer({ id: 'preview-line', type: 'line', source: 'preview', paint: { 'line-color': '#0f0f0d', 'line-width': 4, 'line-opacity': 1, 'line-dasharray': [3,2] }, layout: { 'line-cap': 'round', 'line-join': 'round' } });
      updateRouteLayer();
    });
  }

  // Space = pan mode, release = draw mode
  let spaceHeld = window.innerWidth <= 768; // true (pan) on mobile, false (draw) on desktop

  function enterPanMode() {
    if (spaceHeld) return;
    spaceHeld = true;
    document.body.classList.remove('route-mode');
    document.body.style.cursor = 'grab';
    map.dragPan.enable();
    map.scrollZoom.enable();
    map.doubleClickZoom.enable();
    map.touchZoomRotate.enable();
    showSpaceHint(true);
  }

  function exitPanMode() {
    spaceHeld = false;
    document.body.classList.add('route-mode');
    document.body.style.cursor = '';
    map.dragPan.disable();
    map.scrollZoom.disable();
    map.doubleClickZoom.disable();
    map.touchZoomRotate.disable();
    showSpaceHint(false);
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.repeat && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      enterPanMode();
    }
  });

  document.addEventListener('keyup', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      exitPanMode();
    }
  });

  // Desktop starts in draw mode; mobile handled by initMobileMode
  if (window.innerWidth > 768) {
    map.dragPan.disable();
    map.scrollZoom.disable();
    map.doubleClickZoom.disable();
  }
  map.touchZoomRotate.enable();

  function showSpaceHint(show) {
    const el = document.getElementById('space-hint');
    const txt = document.getElementById('space-hint-text');
    if (!el) return;
    if (show) {
      el.classList.add('panning');
      txt.innerHTML = 'Panning — release <kbd>Space</kbd> to draw';
    } else {
      el.classList.remove('panning');
      txt.innerHTML = 'Hold <kbd>Space</kbd> to pan';
    }
  }

  function setMode(m) {} // kept for compatibility

  function haversine(a, b) {
    const R = 6371000, r = x => x * Math.PI / 180;
    const dLat = r(b[1]-a[1]), dLon = r(b[0]-a[0]);
    const s = Math.sin(dLat/2)**2 + Math.cos(r(a[1])) * Math.cos(r(b[1])) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
  }

  function totalDistance() {
    let d = 0;
    for (const s of strokes) for (let i = 1; i < s.length; i++) d += haversine(s[i-1], s[i]);
    return d;
  }

  function updateDistance() {
    const d = totalDistance();
    if (units === 'metric') {
      document.getElementById('dist-mi').textContent = (d / 1000).toFixed(2);
      document.getElementById('dist-km').textContent = (d / 1609.344).toFixed(2) + ' mi';
    } else {
      document.getElementById('dist-mi').textContent = (d / 1609.344).toFixed(2);
      document.getElementById('dist-km').textContent = (d / 1000).toFixed(2) + ' km';
    }
    updateRouteLayer();
    updateMileMarkers();
  }

  function updateRouteLayer() {
    if (!map.getSource('route')) return;
    const all = strokes.flat();
    map.getSource('route').setData(all.length > 1 ? lineGeo(all) : emptyGeo());
  }

  function updateMileMarkers() {
    mileMarkers.forEach(m => m.remove()); mileMarkers = [];
    const pts = strokes.flat();
    if (pts.length < 2) return;
    let acc = 0, next = 1609.344, count = 1;
    for (let i = 1; i < pts.length; i++) {
      const seg = haversine(pts[i-1], pts[i]);
      acc += seg;
      while (acc >= next) {
        const frac = 1 - (acc - next) / seg;
        const lng = pts[i-1][0] + frac * (pts[i][0] - pts[i-1][0]);
        const lat = pts[i-1][1] + frac * (pts[i][1] - pts[i-1][1]);
        const el = document.createElement('div');
        el.className = 'mile-pip';
        el.innerHTML = `<div class="mile-pip-dot"></div><div class="mile-pip-label">${count} mi</div>`;
        mileMarkers.push(new mapboxgl.Marker({ element: el, anchor: 'left' }).setLngLat([lng, lat]).addTo(map));
        count++; next += 1609.344;
      }
    }
  }

  function getXY(e) {
    if (e.lngLat) return [e.lngLat.lng, e.lngLat.lat];
    if (e.originalEvent?.touches?.[0]) {
      const t = e.originalEvent.touches[0];
      const rect = map.getContainer().getBoundingClientRect();
      const pt = map.unproject([t.clientX - rect.left, t.clientY - rect.top]);
      return [pt.lng, pt.lat];
    }
    return null;
  }

  map.on('mousedown', e => {
    if (spaceHeld) return;
    drawing = true;
    const xy = getXY(e); if (!xy) return;
    if (strokes.flat().length === 0 && !startMarker) {
      const el = document.createElement('div'); el.className = 'start-pip'; el.textContent = 'Start';
      startMarker = new mapboxgl.Marker({ element: el, anchor: 'left' }).setLngLat(xy).addTo(map);
    }
    currentStroke = [xy];
  });

  map.on('mousemove', e => {
    if (spaceHeld || !drawing) return;
    const xy = getXY(e); if (!xy) return;
    const last = currentStroke[currentStroke.length - 1];
    if (map.project(xy).dist(map.project(last)) < 3) return;
    currentStroke.push(xy);
    if (map.getSource('preview') && currentStroke.length > 1) map.getSource('preview').setData(lineGeo(currentStroke));
  });

  map.on('mouseup', stopDraw);

  map.on('touchstart', e => {
    if (spaceHeld) return;
    e.preventDefault(); drawing = true;
    const xy = getXY(e); if (!xy) return;
    if (strokes.flat().length === 0 && !startMarker) {
      const el = document.createElement('div'); el.className = 'start-pip'; el.textContent = 'Start';
      startMarker = new mapboxgl.Marker({ element: el, anchor: 'left' }).setLngLat(xy).addTo(map);
    }
    currentStroke = [xy];
  });

  map.on('touchmove', e => {
    if (spaceHeld || !drawing) return;
    e.preventDefault();
    const xy = getXY(e); if (!xy) return;
    currentStroke.push(xy);
    if (map.getSource('preview') && currentStroke.length > 1) map.getSource('preview').setData(lineGeo(currentStroke));
  });

  map.on('touchend', stopDraw);

  async function stopDraw() {
    if (!drawing) return;
    drawing = false;
    if (currentStroke.length < 2) { currentStroke = []; return; }
    snapEl.classList.add('visible');
    try {
      const snapped = await snapToRoads(currentStroke);
      strokes.push((snapped && snapped.length > 1) ? snapped : currentStroke);
    } catch { strokes.push(currentStroke); }
    if (map.getSource('preview')) map.getSource('preview').setData(emptyGeo());
    snapEl.classList.remove('visible');
    currentStroke = [];
    updateDistance();
  }

  function perpDist(pt, a, b) {
    const dx=b[0]-a[0], dy=b[1]-a[1], l2=dx*dx+dy*dy;
    if (!l2) return Math.hypot(pt[0]-a[0], pt[1]-a[1]);
    const t=Math.max(0,Math.min(1,((pt[0]-a[0])*dx+(pt[1]-a[1])*dy)/l2));
    return Math.hypot(pt[0]-(a[0]+t*dx), pt[1]-(a[1]+t*dy));
  }
  function simplify(pts, tol) {
    if (pts.length<=2) return pts;
    let mx=0, mi=0;
    for (let i=1;i<pts.length-1;i++){const d=perpDist(pts[i],pts[0],pts[pts.length-1]);if(d>mx){mx=d;mi=i;}}
    if (mx>tol) return simplify(pts.slice(0,mi+1),tol).slice(0,-1).concat(simplify(pts.slice(mi),tol));
    return [pts[0],pts[pts.length-1]];
  }
  async function snapToRoads(raw) {
    let s = simplify(raw, 0.00015);
    // Cap at 25 waypoints for Mapbox (max 25 coordinates per request)
    if (s.length > 25) s = s.filter((_,i) => i % Math.ceil(s.length/25) === 0 || i === s.length-1);
    const coords = s.map(p => `${p[0]},${p[1]}`).join(';');
    const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${coords}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.routes || !data.routes[0]) return null;
    return data.routes[0].geometry.coordinates;
  }

  async function closeLoop() {
    if (!strokes.length) return;
    const first = strokes[0][0], last = strokes[strokes.length-1][strokes[strokes.length-1].length-1];
    snapEl.classList.add('visible');
    try {
      const snapped = await snapToRoads([last, first]);
      strokes.push((snapped&&snapped.length>1)?snapped:[last,first]);
    } catch { strokes.push([last,first]); }
    snapEl.classList.remove('visible');
    updateDistance();
  }

  function undoStroke() {
    if (!strokes.length) return;
    strokes.pop();
    if (!strokes.length && startMarker) { startMarker.remove(); startMarker = null; }
    updateDistance();
  }

  function clearRoute() {
    strokes = [];
    if (startMarker) { startMarker.remove(); startMarker = null; }
    mileMarkers.forEach(m => m.remove()); mileMarkers = [];
    if (map.getSource('route')) map.getSource('route').setData(emptyGeo());
    if (map.getSource('preview')) map.getSource('preview').setData(emptyGeo());
    document.getElementById('dist-mi').textContent = '0.00';
    document.getElementById('dist-km').textContent = '0.00 km';
  }

  function locateMe() {
    if (!navigator.geolocation) {
      alert('Geolocation is not supported by your browser.');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const ll = [pos.coords.longitude, pos.coords.latitude];
        if (locationMarker) locationMarker.remove();
        const el = document.createElement('div'); el.className = 'locate-dot';
        locationMarker = new mapboxgl.Marker({ element: el }).setLngLat(ll).addTo(map);
        map.flyTo({ center: ll, zoom: 15, duration: 1200 });
      },
      err => {
        if (err.code === 1) {
          alert('Location access denied. Please allow location access in your browser settings.');
        } else {
          alert('Could not get your location. Please try again.');
        }
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function toggleRoutes() {
    routesOpen = !routesOpen;
    document.getElementById('routes-panel').classList.toggle('open', routesOpen);
    const rt = document.getElementById('routes-toggle'); if(rt) rt.textContent = routesOpen ? 'Close' : 'Routes';
    if (routesOpen) renderRoutes();
  }

  function openSave() {
    if (!strokes.length) return;
    document.getElementById('save-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('save-sheet').classList.add('open');
  }
  function closeSave() { document.getElementById('save-sheet').classList.remove('open'); }

  function saveRoute() {
    const name = document.getElementById('save-name').value.trim();
    if (!name) { document.getElementById('save-name').focus(); return; }
    const route = {
      id: Date.now(), name,
      date: document.getElementById('save-date').value,
      notes: document.getElementById('save-notes').value.trim(),
      distanceMi: (totalDistance() / 1609.344).toFixed(2),
      strokes: strokes.map(s => s.map(p => [p[0], p[1]]))
    };
    const saved = getSaved(); saved.unshift(route);
    localStorage.setItem('runplan_routes', JSON.stringify(saved));
    document.getElementById('save-name').value = '';
    document.getElementById('save-notes').value = '';
    closeSave();
    if (routesOpen) renderRoutes();
  }

  function getSaved() {
    try { return JSON.parse(localStorage.getItem('runplan_routes') || '[]'); } catch { return []; }
  }


  // ── Settings ───────────────────────────────────────────────
  let settingsOpen = false;
  let units = 'imperial';
  let northLocked = false;

  function toggleSettings() {
    settingsOpen = !settingsOpen;
    document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
    document.getElementById('gear-btn').classList.toggle('open', settingsOpen);
  }

  function setUnits(u) {
    units = u;
    document.getElementById('unit-imperial').classList.toggle('active', u === 'imperial');
    document.getElementById('unit-metric').classList.toggle('active', u === 'metric');
    document.getElementById("dist-unit").textContent = u === "metric" ? "km" : "mi";
    updateDistance();
  }

  function setNorth(n) {
    northLocked = n === 'true';
    document.getElementById('north-free').classList.toggle('active', n === 'free');
    document.getElementById('north-true').classList.toggle('active', n === 'true');
    if (northLocked) {
      map.setBearing(0);
      map.dragRotate.disable();
      map.touchZoomRotate.disableRotation();
    } else {
      map.dragRotate.enable();
      map.touchZoomRotate.enableRotation();
    }
  }

  function renderRoutes() {
    const saved = getSaved();
    const el = document.getElementById('routes-inner');
    if (!saved.length) { el.innerHTML = '<div class="routes-empty">No routes saved yet.</div>'; return; }
    el.innerHTML = saved.map(r => `
      <div class="route-item">
        <div class="route-item-top">
          <div class="route-item-name">${r.name}</div>
          <div class="route-item-dist">${r.distanceMi} mi</div>
        </div>
        <div class="route-item-meta">${r.date ? r.date : ''}${r.notes ? ' · ' + r.notes : ''}</div>
        <div class="route-item-actions">
          <button class="route-item-btn" onclick="loadRoute(${r.id})">Load</button>
          <button class="route-item-btn del" onclick="deleteRoute(${r.id})">Delete</button>
        </div>
      </div>`).join('');
  }

  function loadRoute(id) {
    const route = getSaved().find(r => r.id === id);
    if (!route) return;
    clearRoute();
    strokes = route.strokes;
    if (strokes.length && strokes[0].length) {
      const el = document.createElement('div'); el.className = 'start-pip'; el.textContent = 'Start';
      startMarker = new mapboxgl.Marker({ element: el, anchor: 'left' }).setLngLat(strokes[0][0]).addTo(map);
    }
    updateDistance();
    const all = strokes.flat();
    if (all.length > 1) {
      const bounds = all.reduce((b, p) => b.extend(p), new mapboxgl.LngLatBounds(all[0], all[0]));
      map.fitBounds(bounds, { padding: 100, duration: 1000 });
    }
    toggleRoutes();
  }

  function deleteRoute(id) {
    const saved = getSaved().filter(r => r.id !== id);
    localStorage.setItem('runplan_routes', JSON.stringify(saved));
    renderRoutes();
  }



  // ── Mobile cmd panel toggle ────────────────────────────────
  function toggleCmd() {}

  // ── Mobile mode toggle ─────────────────────────────────────
  let mobileMode = 'pan';

  function setMobileMode(m) {
    mobileMode = m;
    document.getElementById('mobile-btn-draw').classList.toggle('active', m === 'draw');
    document.getElementById('mobile-btn-pan').classList.toggle('active', m === 'pan');
    if (m === 'pan') {
      map.dragPan.enable();
      map.scrollZoom.enable();
      map.touchZoomRotate.enable();
      spaceHeld = true;
    } else {
      map.dragPan.disable();
      map.scrollZoom.disable();
      map.touchZoomRotate.disable();
      spaceHeld = false;
    }
  }

  // Init mobile mode after map loads
  function initMobileMode() {
    if (window.innerWidth <= 768) {
      setMobileMode('pan');
    }
  }

  // ── Wordmark letter flip ───────────────────────────────────
  (function() {
    const letters = document.querySelectorAll('.wl');
    const flipped = new Set();

    function maybeFlip() {
      const idx = Math.floor(Math.random() * letters.length);
      const letter = letters[idx];

      if (flipped.has(idx)) {
        // flip back
        letter.classList.remove('flipped');
        flipped.delete(idx);
      } else {
        // flip forward
        letter.classList.add('flipped');
        flipped.add(idx);
        // auto flip back after random short delay
        setTimeout(() => {
          letter.classList.remove('flipped');
          flipped.delete(idx);
        }, 400 + Math.random() * 800);
      }

      // schedule next event at random interval
      setTimeout(maybeFlip, 2500 + Math.random() * 5000);
    }

    // kick off after a short pause
    setTimeout(maybeFlip, 3000);
  })();

</script>
