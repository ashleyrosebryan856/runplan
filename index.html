<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUNPLAN</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f5f3ef;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      color: #f5f3ef;
    }

    header h1 {
      font-size: 18px;
      font-weight: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dist-display {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 0 16px;
      border-right: 1px solid rgba(245,243,239,0.2);
      margin-right: 6px;
    }

    .dist-display .miles {
      font-size: 26px;
      font-weight: normal;
      letter-spacing: -0.02em;
      color: #f5f3ef;
    }

    .dist-display .unit {
      font-size: 12px;
      color: rgba(245,243,239,0.55);
      letter-spacing: 0.05em;
    }

    .dist-display .km {
      font-size: 13px;
      color: rgba(245,243,239,0.45);
    }

    button {
      background: transparent;
      border: 1px solid rgba(245,243,239,0.3);
      color: #f5f3ef;
      padding: 7px 16px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: rgba(245,243,239,0.1);
      border-color: rgba(245,243,239,0.6);
    }

    button:active { opacity: 0.7; }

    button.locate {
      padding: 7px 12px;
      font-size: 16px;
    }

    #map {
      flex: 1;
      width: 100%;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,26,26,0.75);
      color: rgba(245,243,239,0.85);
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 8px 18px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      transition: opacity 0.4s;
    }

    .hint.hidden { opacity: 0; }
  </style>
</head>
<body>

<header>
  <h1>RUNPLAN</h1>
  <div class="controls">
    <div class="dist-display">
      <span class="miles" id="dist-mi">0.00</span>
      <span class="unit">mi</span>
      <span class="km" id="dist-km">· 0.00 km</span>
    </div>
    <button onclick="undoLast()">Undo</button>
    <button onclick="clearRoute()">Clear</button>
    <button class="locate" onclick="locateMe()" title="Go to my location">⊕</button>
  </div>
</header>

<div style="position:relative; flex:1;">
  <div id="map"></div>
  <div class="hint" id="hint">Click the map to start plotting your route</div>
</div>

<script>
  const map = L.map('map', { zoomControl: true }).setView([45.5231, -122.6765], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  let points = [], markers = [], polyline = null;
  const hint = document.getElementById('hint');

  const makeIcon = (color, size) => L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,0.4);"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });

  function haversine(a, b) {
    const R = 6371000, r = x => x * Math.PI / 180;
    const dLat = r(b.lat - a.lat), dLon = r(b.lng - a.lng);
    const s = Math.sin(dLat/2)**2 + Math.cos(r(a.lat)) * Math.cos(r(b.lat)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
  }

  function updateDistance() {
    let d = 0;
    for (let i = 1; i < points.length; i++) d += haversine(points[i-1], points[i]);
    document.getElementById('dist-mi').textContent = (d / 1609.344).toFixed(2);
    document.getElementById('dist-km').textContent = '· ' + (d / 1000).toFixed(2) + ' km';
  }

  function redraw() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    points.forEach((p, i) => {
      const icon = i === 0 ? makeIcon('#2d8a5e', 14) : makeIcon('#c0392b', 10);
      markers.push(L.marker(p, { icon, interactive: false }).addTo(map));
    });
    if (polyline) map.removeLayer(polyline);
    if (points.length > 1) {
      polyline = L.polyline(points, { color: '#c0392b', weight: 3.5, opacity: 0.85 }).addTo(map);
    }
    updateDistance();
  }

  map.on('click', e => {
    points.push(e.latlng);
    if (points.length === 1) {
      hint.classList.add('hidden');
    }
    redraw();
  });

  function undoLast() {
    if (!points.length) return;
    points.pop();
    if (points.length === 0) hint.classList.remove('hidden');
    redraw();
  }

  function clearRoute() {
    points = [];
    hint.classList.remove('hidden');
    redraw();
  }

  function locateMe() {
    map.locate({ setView: true, maxZoom: 15 });
  }

  map.on('locationfound', e => map.setView(e.latlng, 15));
  map.on('locationerror', () => alert('Could not get your location. Please allow location access in your browser.'));
</script>
</body>
</html>
